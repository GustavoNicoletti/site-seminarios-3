<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Aluno - {{ aluno.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark p-4">
                        <h4 class="mb-0">✏️ Editar Perfil: {{ aluno.nome }}</h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- O enctype é fundamental para o upload de arquivos -->
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <div class="mt-4">
                                <button type="submit" class="btn btn-success px-4">Salvar Alterações</button>
                                <a href="{% url 'lista_alunos' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</bo
