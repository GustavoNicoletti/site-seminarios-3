<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - {{ aluno.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #4a90e2; }
        .card-custom { border: none; border-radius: 18px; }
        .notas-card { border-left: 6px solid #4a90e2; min-height: 320px; }
        .avatar-aluno {
            width: 120px; height: 120px;
            background-color: #e9f2ff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; margin: 0 auto 20px auto;
            overflow: hidden; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .avatar-aluno img { width: 100%; height: 100%; object-fit: cover; }
        .notas-box { background: #f8f9fa; border-radius: 12px; padding: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Portal Escola TEA</a>
            <a href="{% url 'lista_alunos' %}" class="btn btn-light btn-sm">Voltar</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-custom shadow-sm p-4 text-center">
                    <div class="avatar-aluno">
                        {% if aluno.foto %}
                            <img src="{{ aluno.foto.url }}" alt="{{ aluno.nome }}">
                        {% else %}
                            👨‍🎓
                        {% endif %}
                    </div>
                    <h3 class="fw-bold">{{ aluno.nome }}</h3>
                    <div class="text-start mt-4">
                        <p class="text-muted small mb-0">RA</p>
                        <p class="fw-bold">{{ aluno.ra }}</p>
                        <p class="text-muted small mb-0">TURMA</p>
                        <p class="fw-bold">{{ aluno.turma }}</p>
                    </div>
                    <a href="{% url 'editar_aluno' aluno.pk %}" class="btn btn-warning w-100 fw-bold mt-3">Editar</a>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card card-custom notas-card shadow-sm p-4">
                    <h4 class="fw-bold text-primary mb-4">📝 Observações e Notas</h4>
                    {% if aluno.observacoes %}
                        <div class="notas-box border">{{ aluno.observacoes }}</div>
                    {% else %}
                        <div class="alert alert-light text-center border-dashed">Nenhuma nota registrada.</div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
