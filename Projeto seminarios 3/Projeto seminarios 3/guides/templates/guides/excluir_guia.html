<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Excluir Guia - Escola TEA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body p-5 text-center">
                        <h2 class="text-danger mb-4">Confirmar Exclusão</h2>
                        <p class="fs-5">Deseja realmente excluir o guia:</p>
                        <h4 class="fw-bold mb-4">"{{ item.titulo }}"?</h4>
                        <p class="text-muted small">Essa ação é permanente e não pode ser desfeita.</p>
                        
                        <form method="POST" class="mt-4">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-5 me-2">Sim, Excluir</button>
                            <a href="{% url 'detalhe_guia' item.pk %}" class="btn btn-outline-secondary px-5">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
